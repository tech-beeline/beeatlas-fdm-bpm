resources:
  limits:
    cpu: 2000m
    memory: 2000Mi
  requests:
    cpu: 500m
    memory: 500Mi

ingress:
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-headers: Content-Type, authorization
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, DELETE, OPTIONS
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: 'true'

env:
  JAVACMD: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8090"
  SPRING_PROFILES_ACTIVE: func
  SPRING_DATASOURCE_CAMUNDA_DRIVER_CLASS_NAME: "vault:eafdmmart/data/test/func/bpm#driver"
  SPRING_DATASOURCE_CAMUNDA_URL: "vault:eafdmmart/data/test/func/bpm#url"
  SPRING_DATASOURCE_CAMUNDA_USERNAME: "vault:eafdmmart/data/test/func/bpm#username"
  SPRING_DATASOURCE_CAMUNDA_PASSWORD: "vault:eafdmmart/data/test/func/bpm#password"
