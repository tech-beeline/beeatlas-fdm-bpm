ingress:
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-headers: Content-Type, authorization
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, DELETE, OPTIONS
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: 'true'

env:
  JAVACMD: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8090"
  SPRING_PROFILES_ACTIVE: func
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "vault:eafdmmart/data/test/func/bpm#driver"
  SPRING_DATASOURCE_URL: "vault:eafdmmart/data/test/func/bpm#url"
  SPRING_DATASOURCE_USERNAME: "vault:eafdmmart/data/test/func/bpm#username"
  SPRING_DATASOURCE_PASSWORD: "vault:eafdmmart/data/test/func/bpm#password"
  SPRING_RABBITMQ_TEMPLATE_EXCHANGE: "vault:eafdmmart/data/test/func/fdm#rabbitmqtemplateexchange"
  SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: "vault:eafdmmart/data/test/func/fdm#rabbitmqtemplateroutingkey"
  SPRING_RABBITMQ_HOST: "vault:eafdmmart/data/test/func/fdm#rabbitmqhost"
  SPRING_RABBITMQ_PORT: "vault:eafdmmart/data/test/func/fdm#rabbitmqport"
  SPRING_RABBITMQ_USERNAME: "vault:eafdmmart/data/test/func/fdm#rabbitmqusername"
  SPRING_RABBITMQ_PASSWORD: "vault:eafdmmart/data/test/func/fdm#rabbitmqpassword"
  SPRING_RABBITMQ_VIRTUAL_HOST: "vault:eafdmmart/data/test/func/fdm#rabbitmqvirtualhost"
  INTEGRATION_CAPABILITY_SERVER_URL: "vault:eafdmmart/data/test/func/fdm#capabilityserver"
  INTEGRATION_DASHBOARD_SERVER_URL: "vault:eafdmmart/data/test/func/fdm#dashboardserver"
  INTEGRATION_PACK_LOADER_SERVER_URL: "vault:eafdmmart/data/test/func/fdm#packloaderserver"
  GWURL: "vault:eafdmmart/data/test/func/fdm#mapicurl"
  AUTHBASIC: "vault:eafdmmart/data/test/func/fdm#mapicauth"
  TECHUSER: "vault:eafdmmart/data/test/func/fdm#techuser"
  TECHPASSWORD: "vault:eafdmmart/data/test/func/fdm#techpassword"
